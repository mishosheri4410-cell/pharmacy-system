<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>عروض الصيدلية - Dr. Sherif Shaaban</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f5f7fa;color:#1a1a2e;min-height:100vh}
.top-bar{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.top-bar h1{font-size:18px;font-weight:700}
.top-bar .lock-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .2s}
.top-bar .lock-btn:hover{background:rgba(255,255,255,.15)}
.container{max-width:500px;margin:0 auto;padding:16px}
.section-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.empty-state{text-align:center;padding:60px 20px;color:#999}
.empty-state .icon{font-size:64px;margin-bottom:16px}
.empty-state p{font-size:14px;line-height:1.6}
.offer-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.08);margin-bottom:20px;transition:transform .2s}
.offer-card:active{transform:scale(.98)}
.offer-media{width:100%;max-height:300px;object-fit:cover;display:block;background:#f0f4ff}
.offer-media.video{aspect-ratio:16/9}
.offer-body{padding:16px}
.offer-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.offer-desc{font-size:13px;color:#666;line-height:1.5;margin-bottom:10px}
.offer-badge{display:inline-block;background:#ffd600;color:#1a1a1a;padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700}
.offer-price{font-size:20px;font-weight:800;color:#0d47a1;margin-top:6px}
.offer-price .old{font-size:14px;color:#999;text-decoration:line-through;font-weight:400;margin-left:8px}
.offer-date{font-size:11px;color:#bbb;margin-top:6px}
.qr-section{text-align:center;padding:24px 16px;margin-top:8px;border-top:1px dashed #ddd}
.qr-section p{font-size:12px;color:#888;margin-top:10px}
#qrcode{display:inline-block;padding:10px;background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.admin-section{display:none;padding:16px;margin-top:16px;background:#fff;border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.08)}
.admin-section.open{display:block}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.admin-header h2{font-size:16px;color:#1a1a2e}
.close-admin{background:none;border:none;font-size:20px;cursor:pointer;color:#999;padding:4px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:4px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:12px;border:2px solid #e0e7ef;border-radius:10px;font-size:14px;outline:none;transition:border .2s;font-family:inherit}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:#0d47a1}
.form-group textarea{resize:vertical;min-height:60px}
.form-group input[type=file]{padding:8px;border:2px dashed #ccc;background:#fafbfc}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;width:100%;color:#fff}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#0d47a1,#1a73e8)}
.btn-danger{background:linear-gradient(135deg,#c0392b,#e74c3c)}
.btn-success{background:linear-gradient(135deg,#27ae60,#2ecc71)}
.btn-outline{background:#fff;color:#0d47a1;border:2px solid #0d47a1}
.btn-sm{padding:6px 14px;font-size:12px;width:auto}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.admin-offer-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;background:#f8f9fa;margin-bottom:8px}
.admin-offer-item .thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;background:#e0e7ef;flex-shrink:0}
.admin-offer-item .info{flex:1;min-width:0}
.admin-offer-item .info .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-offer-item .info .type{font-size:11px;color:#888}
.admin-offer-item .del-btn{background:#fee2e2;border:none;color:#dc2626;width:32px;height:32px;border-radius:8px;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.admin-offer-item .del-btn:hover{background:#fecaca}
.pin-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:999;padding:20px}
.pin-overlay.open{display:flex}
.pin-box{background:#fff;border-radius:18px;padding:30px 25px;width:100%;max-width:320px;text-align:center}
.pin-box h3{font-size:18px;margin-bottom:4px}
.pin-box p{font-size:12px;color:#888;margin-bottom:18px}
.pin-input{width:100%;padding:14px;border:2px solid #e0e7ef;border-radius:10px;font-size:22px;text-align:center;letter-spacing:8px;outline:none;margin-bottom:12px;direction:ltr}
.pin-input:focus{border-color:#0d47a1}
.toggle-link{color:#0d47a1;font-size:12px;cursor:pointer;text-align:center;display:block;margin-top:10px}
.media-preview{position:relative;margin-top:8px;border-radius:10px;overflow:hidden;max-height:200px}
.media-preview img,.media-preview video{width:100%;display:block}
.media-preview .remove-media{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.footer{text-align:center;padding:20px;font-size:11px;color:#aaa}
@media(max-width:400px){.top-bar h1{font-size:15px}}
</style>
</head>
<body>

<div class="top-bar">
  <h1>🏥 عروض صيدليات د. شريف شعبان</h1>
  <button class="lock-btn" onclick="showPinOverlay()" title="إدارة العروض">⚙️</button>
</div>

<div class="container">

  <!-- Public Offers -->
  <div id="offersList"></div>

  <!-- QR Code -->
  <div class="qr-section">
    <div id="qrcode"></div>
    <p>📱 امسح الكود لترى العروض على موبايلك</p>
  </div>

  <!-- PIN Overlay -->
  <div class="pin-overlay" id="pinOverlay">
    <div class="pin-box">
      <h3>🔒 إدارة العروض</h3>
      <p>أدخل رمز PIN للدخول إلى لوحة التحكم</p>
      <input class="pin-input" id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="******">
      <button class="btn btn-primary" onclick="checkPin()">تأكيد</button>
      <span class="toggle-link" onclick="closePinOverlay()">⬅ إلغاء</span>
    </div>
  </div>

  <!-- Admin Panel -->
  <div class="admin-section" id="adminSection">
    <div class="admin-header">
      <h2>⚙️ لوحة إدارة العروض</h2>
      <button class="close-admin" onclick="closeAdmin()">✕</button>
    </div>

    <!-- Admin: Set PIN -->
    <div class="form-group">
      <label>🔑 رمز PIN للإدارة (4-6 أرقام)</label>
      <div style="display:flex;gap:8px">
        <input id="adminPinInput" type="password" inputmode="numeric" maxlength="6" placeholder="******" style="flex:1">
        <button class="btn btn-success btn-sm" onclick="setAdminPin()" style="width:auto">حفظ</button>
      </div>
    </div>
    <hr style="border:none;border-top:1px solid #eee;margin:16px 0">

    <!-- Admin: Add Offer Form -->
    <h3 style="font-size:14px;margin-bottom:12px;color:#0d47a1">➕ إضافة عرض جديد</h3>
    <div class="form-group">
      <label>عنوان العرض</label>
      <input id="offerTitle" placeholder="مثال: خصم 30% على منتجات العناية">
    </div>
    <div class="form-group">
      <label>وصف العرض</label>
      <textarea id="offerDesc" placeholder="تفاصيل العرض..."></textarea>
    </div>
    <div class="form-group">
      <label>السعر (اختياري)</label>
      <div style="display:flex;gap:8px">
        <input id="offerPrice" type="number" placeholder="السعر بعد الخصم" style="flex:1">
        <input id="offerOldPrice" type="number" placeholder="السعر قبل الخصم" style="flex:1">
      </div>
    </div>
    <div class="form-group">
      <label>نوع الوسائط</label>
      <select id="mediaType" onchange="toggleMediaInputs()">
        <option value="image">صورة</option>
        <option value="video">فيديو</option>
      </select>
    </div>
    <div class="form-group" id="uploadGroup">
      <label>رفع صورة أو فيديو</label>
      <input id="fileInput" type="file" accept="image/*,video/*" onchange="handleFileSelect(event)">
      <div class="media-preview" id="mediaPreview" style="display:none">
        <button class="remove-media" onclick="removeSelectedMedia()">✕</button>
        <div id="previewContent"></div>
      </div>
      <p style="font-size:11px;color:#999;margin-top:4px">أو استخدم رابط خارجي أدناه ⬇</p>
    </div>
    <div class="form-group">
      <label>رابط صورة / فيديو (اختياري — بديل عن الرفع)</label>
      <input id="offerUrl" placeholder="https://example.com/photo.jpg">
    </div>
    <div class="form-group">
      <label>رابط يوتيوب (للفيديو — اختياري)</label>
      <input id="youtubeUrl" placeholder="https://youtube.com/watch?v=...">
    </div>
    <button class="btn btn-primary" onclick="addOffer()">➕ إضافة العرض</button>

    <hr style="border:none;border-top:1px solid #eee;margin:20px 0">

    <!-- Admin: Offer List -->
    <h3 style="font-size:14px;margin-bottom:12px;color:#0d47a1">📋 العروض الحالية (<span id="offerCount">0</span>)</h3>
    <div id="adminOfferList"></div>
    <button class="btn btn-danger" style="margin-top:12px" onclick="clearAllOffers()">🗑️ حذف كل العروض</button>
  </div>

</div>

<div class="footer">صيدليات د. شريف شعبان — فلمنج، الإسكندرية © 2026</div>

<script>
const STORAGE_KEY = 'pharmacy_offers_data'
const PIN_KEY = 'pharmacy_offers_pin'
let selectedFileData = null

function getOffers() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [] } catch(e) { return [] }
}

function saveOffers(offers) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(offers))
}

function getPin() {
  return localStorage.getItem(PIN_KEY) || ''
}

function setPin(pin) {
  localStorage.setItem(PIN_KEY, pin)
}

// Render public offers
function renderOffers() {
  const offers = getOffers()
  const container = document.getElementById('offersList')
  if (!offers.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">🎉</div>
        <p><strong>قريباً!</strong><br>عروض وخصومات جديدة في الطريق<br>تابعونا لمعرفة التفاصيل</p>
      </div>`
    return
  }
  container.innerHTML = offers.map((o, i) => {
    let mediaHtml = ''
    if (o.youtubeId) {
      mediaHtml = `<iframe class="offer-media video" src="https://www.youtube.com/embed/${o.youtubeId}" frameborder="0" allowfullscreen loading="lazy"></iframe>`
    } else if (o.dataUrl) {
      if (o.mediaType === 'video') {
        mediaHtml = `<video class="offer-media video" controls><source src="${o.dataUrl}"></video>`
      } else {
        mediaHtml = `<img class="offer-media" src="${o.dataUrl}" alt="${o.title}" loading="lazy">`
      }
    } else if (o.url) {
      if (o.mediaType === 'video') {
        mediaHtml = `<video class="offer-media video" controls><source src="${o.url}"></video>`
      } else {
        mediaHtml = `<img class="offer-media" src="${o.url}" alt="${o.title}" loading="lazy" onerror="this.outerHTML='<div style=\\'height:160px;display:flex;align-items:center;justify-content:center;background:#f0f4ff;color:#999\\'>⚠️ لم يتم تحميل الصورة</div>'">`
      }
    }
    const priceHtml = o.price ? `<div class="offer-price">${o.price} <span class="currency">EGP</span>${o.oldPrice ? `<span class="old">${o.oldPrice} EGP</span>` : ''}</div>` : ''
    const badgeHtml = o.badge ? `<div class="offer-badge">${o.badge}</div>` : ''
    return `<div class="offer-card">
      ${mediaHtml}
      <div class="offer-body">
        <div class="offer-title">${o.title}</div>
        ${o.desc ? `<div class="offer-desc">${o.desc.replace(/\n/g, '<br>')}</div>` : ''}
        ${badgeHtml}
        ${priceHtml}
        <div class="offer-date">${o.date || ''}</div>
      </div>
    </div>`
  }).join('')
}

// Admin: render offer list
function renderAdminList() {
  const offers = getOffers()
  document.getElementById('offerCount').textContent = offers.length
  const container = document.getElementById('adminOfferList')
  if (!offers.length) {
    container.innerHTML = '<p style="color:#999;font-size:13px;text-align:center;padding:20px">لا توجد عروض حالياً</p>'
    return
  }
  container.innerHTML = offers.map((o, i) => {
    const thumb = o.dataUrl || o.url || ''
    const thumbHtml = thumb ? `<img class="thumb" src="${thumb}" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' viewBox=\\'0 0 48 48\\'><rect fill=\\'%23e0e7ef\\' width=\\'48\\' height=\\'48\\'/><text x=\\'50%\\' y=\\'50%\\' text-anchor=\\'middle\\' dy=\\'.35em\\' fill=\\'%23999\\' font-size=\\'20\\'>${o.mediaType === 'video' ? '▶' : '🖼'}</text></svg>'">` : `<div class="thumb" style="display:flex;align-items:center;justify-content:center;font-size:20px">${o.mediaType === 'video' ? '▶️' : '🖼️'}</div>`
    const typeLabel = o.mediaType === 'video' ? 'فيديو' : 'صورة'
    return `<div class="admin-offer-item">
      ${thumbHtml}
      <div class="info">
        <div class="name">${o.title}</div>
        <div class="type">${typeLabel} ${o.price ? '• ' + o.price + ' EGP' : ''}</div>
      </div>
      <button class="del-btn" onclick="deleteOffer(${i})" title="حذف">✕</button>
    </div>`
  }).join('')
}

function addOffer() {
  const title = document.getElementById('offerTitle').value.trim()
  const desc = document.getElementById('offerDesc').value.trim()
  const price = document.getElementById('offerPrice').value.trim()
  const oldPrice = document.getElementById('offerOldPrice').value.trim()
  const url = document.getElementById('offerUrl').value.trim()
  const youtubeUrl = document.getElementById('youtubeUrl').value.trim()
  const mediaType = document.getElementById('mediaType').value

  if (!title) { alert('❌ من فضلك أدخل عنوان العرض'); return }

  // Extract YouTube ID
  let youtubeId = ''
  if (youtubeUrl) {
    const match = youtubeUrl.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/)
    if (match) youtubeId = match[1]
    else { alert('❌ رابط يوتيوب غير صحيح'); return }
  }

  if (!youtubeId && !selectedFileData && !url) {
    alert('❌ من فضلك اختر صورة/فيديو أو أدخل رابط')
    return
  }

  const offers = getOffers()
  offers.unshift({
    title,
    desc,
    price: price || '',
    oldPrice: oldPrice || '',
    url,
    dataUrl: selectedFileData,
    youtubeId,
    mediaType: youtubeId ? 'video' : mediaType,
    badge: price ? 'عرض خاص' : '',
    date: new Date().toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' })
  })
  saveOffers(offers)
  renderOffers()
  renderAdminList()
  clearForm()
}

function deleteOffer(index) {
  if (!confirm('هل أنت متأكد من حذف هذا العرض؟')) return
  const offers = getOffers()
  offers.splice(index, 1)
  saveOffers(offers)
  renderOffers()
  renderAdminList()
}

function clearAllOffers() {
  if (!confirm('⚠️ هل أنت متأكد من حذف كل العروض؟ لا يمكن التراجع!')) return
  saveOffers([])
  renderOffers()
  renderAdminList()
}

function clearForm() {
  document.getElementById('offerTitle').value = ''
  document.getElementById('offerDesc').value = ''
  document.getElementById('offerPrice').value = ''
  document.getElementById('offerOldPrice').value = ''
  document.getElementById('offerUrl').value = ''
  document.getElementById('youtubeUrl').value = ''
  document.getElementById('fileInput').value = ''
  selectedFileData = null
  document.getElementById('mediaPreview').style.display = 'none'
}

function handleFileSelect(event) {
  const file = event.target.files[0]
  if (!file) return
  const validTypes = ['image/jpeg','image/png','image/webp','image/gif','video/mp4','video/webm','video/quicktime']
  if (!validTypes.includes(file.type)) {
    alert('❌ الصيغة غير مدعومة. استخدم JPG, PNG, WEBP, GIF, MP4, WEBM')
    return
  }
  const maxSize = 20 * 1024 * 1024
  if (file.size > maxSize) {
    alert('❌ الملف كبير جداً. الحد الأقصى 20 ميجابايت')
    return
  }
  const reader = new FileReader()
  reader.onload = function(e) {
    selectedFileData = e.target.result
    const preview = document.getElementById('mediaPreview')
    const content = document.getElementById('previewContent')
    preview.style.display = 'block'
    if (file.type.startsWith('video/')) {
      document.getElementById('mediaType').value = 'video'
      content.innerHTML = `<video controls><source src="${selectedFileData}"></video>`
    } else {
      document.getElementById('mediaType').value = 'image'
      content.innerHTML = `<img src="${selectedFileData}">`
    }
  }
  reader.readAsDataURL(file)
}

function removeSelectedMedia() {
  selectedFileData = null
  document.getElementById('fileInput').value = ''
  document.getElementById('mediaPreview').style.display = 'none'
}

function toggleMediaInputs() {
  // just a visual cue
}

// PIN management
function showPinOverlay() {
  if (!getPin()) {
    document.getElementById('pinInput').value = ''
    document.getElementById('pinOverlay').classList.add('open')
    return
  }
  document.getElementById('pinInput').value = ''
  document.getElementById('pinOverlay').classList.add('open')
  setTimeout(() => document.getElementById('pinInput').focus(), 100)
}

function closePinOverlay() {
  document.getElementById('pinOverlay').classList.remove('open')
  document.getElementById('pinInput').value = ''
}

function checkPin() {
  const entered = document.getElementById('pinInput').value
  const savedPin = getPin()
  if (!savedPin) {
    // First time - set PIN
    if (entered.length < 4) { alert('❌ PIN يجب أن يكون 4-6 أرقام'); return }
    setPin(entered)
    alert('✅ تم تعيين رمز PIN بنجاح!')
    closePinOverlay()
    openAdmin()
    return
  }
  if (entered === savedPin) {
    closePinOverlay()
    openAdmin()
  } else {
    alert('❌ PIN خطأ! حاول مرة أخرى')
    document.getElementById('pinInput').value = ''
  }
}

function setAdminPin() {
  const pin = document.getElementById('adminPinInput').value.trim()
  if (!pin || pin.length < 4) { alert('❌ PIN يجب أن يكون 4-6 أرقام'); return }
  setPin(pin)
  document.getElementById('adminPinInput').value = ''
  alert('✅ تم تحديث PIN بنجاح')
}

function openAdmin() {
  document.getElementById('adminSection').classList.add('open')
  document.getElementById('adminPinInput').value = getPin()
  renderAdminList()
  document.getElementById('mediaType').value = 'image'
  document.getElementById('mediaPreview').style.display = 'none'
}

function closeAdmin() {
  document.getElementById('adminSection').classList.remove('open')
}

// QR Code generation
function generateQR() {
  const container = document.getElementById('qrcode')
  container.innerHTML = ''
  try {
    new QRCode(container, {
      text: window.location.href,
      width: 160,
      height: 160,
      colorDark: '#0d47a1',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    })
  } catch(e) {
    container.innerHTML = '<p style="color:#999;font-size:13px">⚠️ تعذر إنشاء QR</p>'
  }
}

// Close admin on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeAdmin(); closePinOverlay() }
  if (e.key === 'Enter' && document.getElementById('pinOverlay').classList.contains('open')) checkPin()
})

// Init
renderOffers()
generateQR()
</script>
</body>
</html>
