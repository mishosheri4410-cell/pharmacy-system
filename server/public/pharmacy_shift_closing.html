<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>تقفيل الوردية - صيدليات د. شريف شعبان</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:#f5f7fa;color:#1a1a2e;padding-bottom:80px}
.header{background:linear-gradient(135deg,#1a1a2e,#e67e22);color:#fff;padding:20px 16px;text-align:center}
.header h1{font-size:20px;font-weight:700}
.header .sub{font-size:12px;opacity:.8}
.container{max-width:600px;margin:0 auto;padding:12px}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.card-title{font-size:14px;font-weight:700;margin-bottom:10px;color:#1a1a2e}
.form-group{margin-bottom:10px}
.form-group label{display:block;font-size:11px;font-weight:600;color:#666;margin-bottom:3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:2px solid #e0e7ef;border-radius:8px;font-size:13px;outline:none;transition:border .2s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#e67e22}
.form-group textarea{resize:vertical;min-height:50px;font-family:inherit}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;color:#fff;text-align:center}
.btn:active{transform:scale(.97)}
.btn-orange{background:linear-gradient(135deg,#e67e22,#f39c12)}
.btn-blue{background:linear-gradient(135deg,#0f3460,#1a3a6b)}
.btn-green{background:linear-gradient(135deg,#27ae60,#2ecc71)}
.btn-red{background:linear-gradient(135deg,#c0392b,#e74c3c)}
.btn-group{display:flex;gap:8px;margin-top:10px}
.btn-group .btn{flex:1;padding:12px;font-size:13px}
.wa-preview{background:#fef9e7;border-radius:8px;padding:12px;font-size:12px;white-space:pre-wrap;direction:ltr;text-align:left;max-height:200px;overflow-y:auto;font-family:monospace;margin-top:8px}
.pin-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.pin-box{background:#fff;border-radius:18px;padding:30px 25px;width:100%;max-width:300px;text-align:center}
.pin-box h3{font-size:16px;margin-bottom:4px}
.pin-box p{font-size:12px;color:#888;margin-bottom:15px}
.pin-input{width:100%;padding:14px;border:2px solid #e0e7ef;border-radius:10px;font-size:22px;text-align:center;letter-spacing:8px;outline:none;margin-bottom:12px;direction:ltr}
.pin-input:focus{border-color:#0f3460}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.pin-key{padding:15px;border:none;border-radius:10px;font-size:20px;font-weight:700;cursor:pointer;background:#f0f4f8;transition:all .1s}
.pin-key:active{background:#d0d8e4;transform:scale(.95)}
.pin-key.clear{color:#e74c3c}
.pin-key.ok{background:#0f3460;color:#fff}
.hidden{display:none!important}
.mode-section{display:none}
.mode-section.active{display:block}
.totals{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}
.totals .item{background:#f8faff;padding:12px;border-radius:8px;text-align:center}
.totals .item .num{font-size:20px;font-weight:700;color:#1a1a2e}
.totals .item .lbl{font-size:11px;color:#888}
.totals .item .num.green{color:#27ae60}
.totals .item .num.red{color:#e74c3c}
@media(max-width:400px){
  .form-row,.form-row-3{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <h1>🔄 تقفيل الوردية</h1>
  <div class="sub">Shift Closing Report — صيدليات د. شريف شعبان</div>
</div>

<div class="pin-overlay hidden" id="pinOverlay">
  <div class="pin-box">
    <h3>🔒 حماية المدير</h3>
    <p>أدخل PIN للوصول للإعدادات</p>
    <input class="pin-input" id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="******" readonly>
    <div class="pin-grid" id="pinGrid"></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-red" style="flex:1;font-size:13px;padding:12px" onclick="cancelPin()">إلغاء</button>
      <button class="btn btn-blue" style="flex:1;font-size:13px;padding:12px" onclick="submitPin()">تأكيد</button>
    </div>
  </div>
</div>

<div class="container">

  <div class="mode-section active" id="doctorSection">

    <div class="card">
      <div class="card-title">📋 معلومات الوردية</div>
      <div class="form-row">
        <div class="form-group">
          <label>اسم الدكتور</label>
          <input id="drName" placeholder="اسم الدكتور">
        </div>
        <div class="form-group">
          <label>تاريخ الوردية</label>
          <input id="shiftDate" type="date">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>فترة الوردية</label>
          <select id="shiftPeriod">
            <option value="صباحية">🌅 صباحية (6ص - 2م)</option>
            <option value="مسائية">☀️ مسائية (2م - 10م)</option>
            <option value="ليلية">🌙 ليلية (10م - 6ص)</option>
          </select>
        </div>
        <div class="form-group">
          <label>الفرع</label>
          <input id="branch" value="فلمنج" placeholder="الفرع">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💵 المبيعات</div>
      <div class="form-row-3">
        <div class="form-group">
          <label>مبيعات كاش</label>
          <input id="cashSales" type="number" placeholder="0" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label>مبيعات فيزا</label>
          <input id="cardSales" type="number" placeholder="0" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label>مبيعات محفظة</label>
          <input id="walletSales" type="number" placeholder="0" oninput="calcTotal()">
        </div>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label>تأمين (مباشر)</label>
          <input id="insDirect" type="number" placeholder="0" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label>تأمين (غير مباشر)</label>
          <input id="insIndirect" type="number" placeholder="0" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label>خصم / تخفيضات</label>
          <input id="discounts" type="number" placeholder="0" oninput="calcTotal()">
        </div>
      </div>
      <div class="totals">
        <div class="item">
          <div class="lbl">إجمالي المبيعات</div>
          <div class="num" id="totalSales">0</div>
        </div>
        <div class="item">
          <div class="lbl">صافي الوردية</div>
          <div class="num green" id="netShift">0</div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">💸 المصروفات</div>
      <div class="form-row-3">
        <div class="form-group">
          <label>مصروفات عامة</label>
          <input id="genExpenses" type="number" placeholder="0" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label>مرتجعات</label>
          <input id="returns" type="number" placeholder="0" oninput="calcTotal()">
        </div>
        <div class="form-group">
          <label>أمانة / سلف</label>
          <input id="loans" type="number" placeholder="0" oninput="calcTotal()">
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📝 ملاحظات</div>
      <div class="form-group">
        <textarea id="notes" placeholder="ملاحظات الوردية..."></textarea>
      </div>
      <div class="form-group">
        <label>توقيع الدكتور</label>
        <input id="signature" placeholder="التوقيع">
      </div>
    </div>

    <div class="card">
      <button class="btn btn-orange" style="margin-bottom:8px" onclick="sendWhatsApp()">📤 إرسال التقرير عبر واتساب</button>
      <div class="btn-group">
        <button class="btn btn-blue" onclick="printReport()">🖨️ طباعة</button>
        <button class="btn btn-red" onclick="resetAll()">🔄 مسح</button>
      </div>
    </div>

    <div class="card" id="waPreviewCard" style="display:none">
      <div class="card-title">👁️ معاينة الرسالة</div>
      <div class="wa-preview" id="waPreview"></div>
    </div>
  </div>

  <div class="mode-section" id="managerSection">
    <div class="card">
      <div class="card-title">👑 لوحة المدير</div>
      <div class="form-group">
        <label>رقم واتساب المدير</label>
        <input id="mgrWa" type="tel" inputmode="numeric" placeholder="مثال: 201234567890">
      </div>
      <div class="form-group">
        <label>PIN المدير</label>
        <input id="mgrPin" type="password" inputmode="numeric" maxlength="6" placeholder="******">
      </div>
      <button class="btn btn-blue" onclick="saveMgrSettings()">💾 حفظ</button>
    </div>
    <button class="btn btn-green" style="margin-top:8px" onclick="switchToDoctor()">⬅ الرجوع لوضع الدكتور</button>
  </div>

</div>

<script src="shared.js"></script>
<script>
let managerPin = ''
let managerWa = ''
let currentUser = null

async function init() {
  currentUser = await PharmaAPI.checkAuth()
  if (!currentUser) return
  await PharmaAPI.syncSettingsToLocal()
  managerPin = localStorage.getItem('pharma_pin') || ''
  managerWa = localStorage.getItem('pharma_wa') || ''
  document.getElementById('shiftDate').value = new Date().toISOString().slice(0,10)
  document.getElementById('mgrWa').value = managerWa
  document.getElementById('mgrPin').value = managerPin
  if (currentUser) document.getElementById('drName').value = currentUser.fullName
  buildPinGrid()
  addLogoutButton()
}

function addLogoutButton() {
  const header = document.querySelector('.header h1')
  const logoutLink = document.createElement('div')
  logoutLink.style.cssText = 'font-size:12px;margin-top:6px'
  logoutLink.innerHTML = '<a href="#" onclick="PharmaAPI.logout();return false" style="color:#fff;opacity:0.8;text-decoration:underline">تسجيل خروج</a>'
  header.parentNode.insertBefore(logoutLink, header.nextSibling)
}

function buildPinGrid() {
  const g = document.getElementById('pinGrid')
  g.innerHTML = ['1','2','3','4','5','6','7','8','9','','0','⌫'].map(k => {
    if (k === '') return '<div></div>'
    if (k === '⌫') return '<button class="pin-key clear" onclick="pinBackspace()">⌫</button>'
    return '<button class="pin-key" onclick="pinKey(\''+k+'\')">'+k+'</button>'
  }).join('')
}
function pinKey(k) { const inp = document.getElementById('pinInput'); if (inp.value.length < 6) inp.value += k }
function pinBackspace() { const inp = document.getElementById('pinInput'); inp.value = inp.value.slice(0, -1) }
function cancelPin() { document.getElementById('pinOverlay').classList.add('hidden') }

function submitPin() {
  if (document.getElementById('pinInput').value === managerPin) {
    cancelPin()
    document.getElementById('doctorSection').classList.remove('active')
    document.getElementById('managerSection').classList.add('active')
  } else { alert('❌ PIN خطأ!'); document.getElementById('pinInput').value = '' }
}

function switchToDoctor() {
  document.getElementById('managerSection').classList.remove('active')
  document.getElementById('doctorSection').classList.add('active')
}

if (new URLSearchParams(window.location.search).get('mode') === 'manager' && managerPin) {
  document.getElementById('pinOverlay').classList.remove('hidden')
}

function calcTotal() {
  const cash = parseFloat(document.getElementById('cashSales').value) || 0
  const card = parseFloat(document.getElementById('cardSales').value) || 0
  const wallet = parseFloat(document.getElementById('walletSales').value) || 0
  const insD = parseFloat(document.getElementById('insDirect').value) || 0
  const insI = parseFloat(document.getElementById('insIndirect').value) || 0
  const disc = parseFloat(document.getElementById('discounts').value) || 0
  const gen = parseFloat(document.getElementById('genExpenses').value) || 0
  const ret = parseFloat(document.getElementById('returns').value) || 0
  const loans = parseFloat(document.getElementById('loans').value) || 0
  const total = cash + card + wallet + insD + insI
  const deductions = disc + gen + ret + loans
  document.getElementById('totalSales').textContent = total.toFixed(0)
  document.getElementById('netShift').textContent = (total - deductions).toFixed(0)
}

function buildReport() {
  const dr = document.getElementById('drName').value.trim() || '(دكتور)'
  const date = document.getElementById('shiftDate').value || '(تاريخ)'
  const period = document.getElementById('shiftPeriod').value
  const branch = document.getElementById('branch').value.trim() || '(الفرع)'
  const cash = parseFloat(document.getElementById('cashSales').value) || 0
  const card = parseFloat(document.getElementById('cardSales').value) || 0
  const wallet = parseFloat(document.getElementById('walletSales').value) || 0
  const insD = parseFloat(document.getElementById('insDirect').value) || 0
  const insI = parseFloat(document.getElementById('insIndirect').value) || 0
  const disc = parseFloat(document.getElementById('discounts').value) || 0
  const gen = parseFloat(document.getElementById('genExpenses').value) || 0
  const ret = parseFloat(document.getElementById('returns').value) || 0
  const loans = parseFloat(document.getElementById('loans').value) || 0
  const notes = document.getElementById('notes').value.trim()
  const sig = document.getElementById('signature').value.trim()
  const total = cash + card + wallet + insD + insI
  const deductions = disc + gen + ret + loans
  const net = total - deductions

  let lines = []
  lines.push('🔄 *تقرير تقفيل الوردية*')
  lines.push('═══════════════════════')
  lines.push('🏥 صيدليات د. شريف شعبان - ' + branch)
  lines.push('👨‍⚕️ الدكتور: ' + dr)
  lines.push('📅 التاريخ: ' + date + ' | ' + period)
  lines.push('')
  lines.push('*💵 المبيعات*')
  lines.push('   💰 كاش: ' + cash.toFixed(0) + ' ج.م')
  lines.push('   💳 فيزا: ' + card.toFixed(0) + ' ج.م')
  lines.push('   📱 محفظة: ' + wallet.toFixed(0) + ' ج.م')
  if (insD > 0) lines.push('   🏥 تأمين مباشر: ' + insD.toFixed(0) + ' ج.م')
  if (insI > 0) lines.push('   🏥 تأمين غير مباشر: ' + insI.toFixed(0) + ' ج.م')
  if (disc > 0) lines.push('   🏷 خصومات: ' + disc.toFixed(0) + ' ج.م')
  lines.push('   📊 *الإجمالي: ' + total.toFixed(0) + ' ج.م*')
  lines.push('')
  lines.push('*💸 المصروفات والخصوم*')
  if (gen > 0) lines.push('   • مصروفات عامة: ' + gen.toFixed(0) + ' ج.م')
  if (ret > 0) lines.push('   • مرتجعات: ' + ret.toFixed(0) + ' ج.م')
  if (loans > 0) lines.push('   • أمانات/سلف: ' + loans.toFixed(0) + ' ج.م')
  lines.push('   ➖ الإجمالي: ' + deductions.toFixed(0) + ' ج.م')
  lines.push('')
  if (net >= 0) {
    lines.push('✅ *صافي الوردية: ' + net.toFixed(0) + ' ج.م*')
  } else {
    lines.push('🔴 *العجز: ' + Math.abs(net).toFixed(0) + ' ج.م*')
  }
  if (notes) { lines.push(''); lines.push('📝 *ملاحظات:* ' + notes) }
  if (sig) { lines.push(''); lines.push('✍️ *التوقيع:* ' + sig) }
  lines.push('')
  lines.push('✅ *تم إرسال التقرير آلياً*')
  lines.push('صيدليات د. شريف شعبان - فلمنج')
  return lines.join('\n')
}

function sendWhatsApp() {
  const wa = localStorage.getItem('pharma_wa')
  if (!wa) { alert('❌ لم يتم تعيين رقم واتساب المدير.'); return }
  const text = buildReport()
  document.getElementById('waPreview').textContent = text
  document.getElementById('waPreviewCard').style.display = 'block'
  window.open('https://wa.me/' + wa + '?text=' + encodeURIComponent(text), '_blank')
}

function printReport() {
  const text = buildReport()
  const win = window.open('', '_blank')
  win.document.write('<html dir="rtl"><head><meta charset="UTF-8"><title>تقفيل الوردية</title><style>body{font-family:Arial,sans-serif;padding:30px;line-height:1.8;font-size:14px}pre{white-space:pre-wrap}</style></head><body><pre>'+text+'</pre><script>window.print();<' + '/script></body></html>')
  win.document.close()
}

function resetAll() {
  if (!confirm('مسح كل البيانات؟')) return
  document.querySelectorAll('input[type="number"], input[type="text"], textarea').forEach(el => el.value = '')
  document.getElementById('shiftDate').value = new Date().toISOString().slice(0,10)
  calcTotal()
}

async function saveMgrSettings() {
  const wa = document.getElementById('mgrWa').value.trim().replace(/^0+/, '')
  const pin = document.getElementById('mgrPin').value.trim()
  if (!wa || !pin || pin.length < 4) { alert('❌ أدخل بيانات صحيحة'); return }
  try {
    await PharmaAPI.setSettings({ pharma_wa: wa, pharma_pin: pin })
    localStorage.setItem('pharma_wa', wa); localStorage.setItem('pharma_pin', pin)
    managerWa = wa; managerPin = pin
    alert('✅ تم الحفظ على الخادم')
  } catch (e) { alert('❌ فشل الحفظ: ' + e.message) }
}

init()
</script>
</body>
</html>
