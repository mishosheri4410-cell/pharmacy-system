<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول - صيدليات د. شريف شعبان</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);color:#1a1a2e;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:#fff;border-radius:18px;padding:40px 32px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.1);text-align:center}
.login-box .logo{font-size:48px;margin-bottom:12px}
.login-box h1{font-size:20px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.login-box .sub{font-size:13px;color:#888;margin-bottom:24px}
.form-group{margin-bottom:16px;text-align:right}
.form-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px}
.form-group input{width:100%;padding:12px 14px;border:2px solid #e0e7ef;border-radius:10px;font-size:14px;outline:none;transition:border .2s}
.form-group input:focus{border-color:#0f3460}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;color:#fff}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,#0f3460,#1a3a6b)}
.btn-primary:hover{box-shadow:0 4px 15px rgba(15,52,96,.3)}
.error{color:#e74c3c;font-size:13px;margin-top:8px;display:none}
.loading{display:none;margin-top:12px;font-size:13px;color:#888}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #e0e7ef;border-top-color:#0f3460;border-radius:50%;animation:spin .6s linear infinite;margin-left:6px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:20px;font-size:11px;color:#aaa;position:fixed;bottom:0;left:0;right:0}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">🏥</div>
  <h1>صيدليات د. شريف شعبان</h1>
  <div class="sub">Pharmacy Management System — فلمنج، الإسكندرية</div>
  <form id="loginForm" onsubmit="return doLogin(event)">
    <div class="form-group">
      <label>اسم المستخدم</label>
      <input id="username" type="text" placeholder="Username" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input id="password" type="password" placeholder="Password" autocomplete="current-password" required>
    </div>
    <div class="error" id="loginError"></div>
    <button class="btn btn-primary" type="submit" id="loginBtn">تسجيل الدخول</button>
    <div class="loading" id="loginLoading"><span class="spinner"></span> جاري تسجيل الدخول...</div>
  </form>
</div>
<div class="footer">صيدليات د. شريف شعبان © 2026</div>

<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? '' : 'https://pharmacy-backend.onrender.com';

async function doLogin(e) {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorEl = document.getElementById('loginError');
  const loadingEl = document.getElementById('loginLoading');
  const btn = document.getElementById('loginBtn');

  errorEl.style.display = 'none';
  loadingEl.style.display = 'block';
  btn.disabled = true;

  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      errorEl.textContent = data.error || 'فشل تسجيل الدخول';
      errorEl.style.display = 'block';
      return;
    }
    localStorage.setItem('pharma_token', data.token);
    localStorage.setItem('pharma_user', JSON.stringify(data.user));
    window.location.href = 'pharmacy_hub.html';
  } catch (err) {
    errorEl.textContent = 'خطأ في الاتصال بالخادم';
    errorEl.style.display = 'block';
  } finally {
    loadingEl.style.display = 'none';
    btn.disabled = false;
  }
}

if (localStorage.getItem('pharma_token')) {
  fetch(API + '/api/auth/me', {
    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('pharma_token') }
  }).then(r => {
    if (r.ok) window.location.href = 'pharmacy_hub.html';
    else localStorage.removeItem('pharma_token');
  }).catch(() => {});
}
</script>
</body>
</html>
